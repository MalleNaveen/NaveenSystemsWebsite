<div class="login-container">
  <div class="login-card">
    <h1>Login</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="email?.invalid && (email?.dirty || email?.touched || submitted())"
        />
        <div *ngIf="email?.invalid && (email?.dirty || email?.touched || submitted())" class="error-message">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email address</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="password?.invalid && (password?.dirty || password?.touched || submitted())"
        />
        <div *ngIf="password?.invalid && (password?.dirty || password?.touched || submitted())" class="error-message">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <button type="submit" class="login-btn" [disabled]="loginForm.invalid && submitted()">Login</button>
    </form>
  </div>
</div>
